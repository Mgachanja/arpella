<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- Favicon (use .ico/.png, not jpeg) -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/favicon.png" />

    <!-- Mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />

    <!-- SEO -->
    <title>Arpella Stores | Wholesale & Retail Shop in Ngong Matasia</title>
    <meta
      name="description"
      content="Arpella Stores is a trusted wholesale and retail shop in Ngong Matasia offering groceries, household essentials, and everyday products at affordable prices."
    />
    <meta
      name="keywords"
      content="Arpella Stores, wholesale shop in Ngong Matasia, retail shop in Ngong, groceries in Matasia, affordable shop Kenya, household essentials"
    />
    <link rel="canonical" href="https://www.arpellastore.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Arpella Stores | Wholesale & Retail Shop in Ngong Matasia"
    />
    <meta
      property="og:description"
      content="Shop groceries, household essentials, and everyday products at Arpella Stores in Ngong Matasia."
    />
    <meta property="og:url" content="https://www.arpellastore.com/" />
    <meta property="og:image" content="https://www.arpellastore.com/logo.jpeg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Arpella Stores | Wholesale & Retail Shop in Ngong Matasia"
    />
    <meta
      name="twitter:description"
      content="Wholesale and retail shopping in Ngong Matasia with groceries, household essentials, and everyday products."
    />
    <meta
      name="twitter:image"
      content="https://www.arpellastore.com/logo.jpeg"
    />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- PWA -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.jpeg" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Store",
        "name": "Arpella Stores",
        "url": "https://www.arpellastore.com/",
        "image": "https://www.arpellastore.com/logo.jpeg",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Ngong Matasia",
          "addressCountry": "KE"
        }
      }
    </script>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
